<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ICC Bot">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0f1a">
    <meta name="description" content="ICC Strategy Trading Bot - XAUUSD & GBPJPY">
    
    <!-- Apple Touch Icon (Gold chart emoji) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0f1a'/><text x='50' y='68' text-anchor='middle' font-size='55'>📈</text></svg>">
    
    <!-- Manifest -->

    <title>ICC Strategy Bot</title>
    
    <script src="https://tradingview.com"></script>
    
    <style>
        :root {
            --bg: #0a0f1a;
            --card: #131b2e;
            --accent: #2962ff;
            --buy: #00e676;
            --sell: #ff1744;
            --warn: #ff9100;
            --text: #e0e0e0;
            --sub: #90a4ae;
            --border: #1e2a3a;
            --safe-bottom: env(safe-area-inset-bottom, 10px);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding: 10px;
            padding-bottom: var(--safe-bottom);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .app {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Install Prompt */
        .install-prompt {
            background: linear-gradient(135deg, #2962ff, #00e5ff);
            color: white;
            padding: 14px 18px;
            border-radius: 16px;
            margin: 8px 0 12px;
            display: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            text-align: center;
            animation: slideDown 0.3s ease;
            box-shadow: 0 4px 20px rgba(41,98,255,0.4);
        }
        
        .install-prompt.show {
            display: block;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 10px 0;
            position: sticky;
            top: 0;
            background: rgba(10,15,26,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }
        
        .header h1 {
            font-size: 1.3em;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .header .gradient-text {
            background: linear-gradient(135deg, #2962ff, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header .status-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        
        .mini-badge {
            font-size: 0.6em;
            padding: 3px 8px;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }
        
        .mini-badge.live {
            background: rgba(0,230,118,0.15);
            color: #00e676;
        }
        
        .mini-badge.demo {
            background: rgba(255,145,0,0.15);
            color: #ff9100;
        }
        
        /* Connection Bar */
        .conn-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin: 8px 0;
            font-size: 0.8em;
        }
        
        .conn-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff1744;
            flex-shrink: 0;
        }
        
        .conn-dot.online {
            background: #00e676;
            box-shadow: 0 0 8px rgba(0,230,118,0.5);
            animation: glowPulse 2s infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 4px rgba(0,230,118,0.3); }
            50% { box-shadow: 0 0 12px rgba(0,230,118,0.6); }
        }
        
        .conn-bar .conn-text {
            flex: 1;
            color: var(--sub);
        }
        
        .conn-bar .conn-action {
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
        }
        
        /* API Setup */
        .setup-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin: 8px 0;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .setup-section.collapsed .setup-body {
            display: none;
        }
        
        .setup-header {
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .setup-header .arrow {
            transition: transform 0.3s;
            font-size: 0.7em;
        }
        
        .setup-section.collapsed .arrow {
            transform: rotate(-90deg);
        }
        
        .setup-body {
            padding: 0 14px 14px;
        }
        
        .setup-body input {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.85em;
            -webkit-appearance: none;
            user-select: text;
            -webkit-user-select: text;
        }
        
        .setup-body input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .btn {
            padding: 11px 16px;
            border-radius: 22px;
            border: none;
            font-weight: 700;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
            flex: 1;
        }
        
        .btn-success {
            background: #00e676;
            color: #000;
            flex: 1;
        }
        
        .btn-danger {
            background: #ff1744;
            color: white;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        
        .help-link {
            font-size: 0.65em;
            color: var(--accent);
            margin-top: 6px;
            display: block;
            text-decoration: none;
        }

        /* Signal Panels and Chart Areas */
        .pair-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin: 12px 0;
            padding: 14px;
        }

        .pair-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .pair-title {
            font-size: 1.1em;
            font-weight: 700;
        }

        .pair-status {
            font-size: 0.75em;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .pair-status.buy {
            background: rgba(0, 230, 118, 0.15);
            color: var(--buy);
        }

        .pair-status.sell {
            background: rgba(255, 23, 68, 0.15);
            color: var(--sell);
        }

        .chart-container {
            width: 100%;
            height: 220px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #000;
        }

        /* Trade Performance Log Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .stat-item {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.7em;
            color: var(--sub);
            text-transform: uppercase;
            margin-bottom: 4px;
